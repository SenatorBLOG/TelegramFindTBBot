# Fly.io configuration for Find the Travel Buddy bot
# Polling mode — no HTTP port needed, persistent volume for SQLite.

app = "app-ancient-dust-8003"
primary_region = "ams"      # Amsterdam — closest to Russia/Europe

[build]
  # Use the same Python version as Render
  # Fly auto-detects Python from runtime.txt

[env]
  MODE        = "PROD"
  DB_PATH     = "/data/bot.db"
  WEBHOOK_PATH = "/webhook"   # unused in polling, kept for config compat

# ── Persistent volume (free up to 3 GB on Fly.io) ──────────────────────────
[mounts]
  source      = "bot_data"    # volume name (created via: fly volumes create bot_data)
  destination = "/data"

# ── No HTTP service — this runs as a background worker ─────────────────────
# (polling bots don't need an open port)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
