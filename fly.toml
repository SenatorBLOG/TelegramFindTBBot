# fly.toml — Find the Travel Buddy bot
# Webhook mode on fly.dev domain — keeps the machine alive + free HTTPS.

app = 'telegramfindtbbot'
primary_region = 'yyz'

[build]
  dockerfile = "Dockerfile"

[env]
  MODE         = 'PROD'
  DB_PATH      = '/data/bot.db'
  WEBHOOK_URL  = 'https://telegramfindtbbot.fly.dev'
  WEBHOOK_PATH = '/webhook'
  WEBHOOK_PORT = '8080'

[[mounts]]
  source      = 'bot_data'
  destination = '/data'

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
