# fly.toml — Find the Travel Buddy bot
# Polling mode: no HTTP service, persistent volume for SQLite.

app = 'telegramfindtbbot'
primary_region = 'yyz'

[build]
  dockerfile = "Dockerfile"

[env]
  MODE     = 'PROD'
  DB_PATH  = '/data/bot.db'

[[mounts]]
  source      = 'bot_data'
  destination = '/data'

[processes]
  app = "python main.py"

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
